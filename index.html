<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Pliant:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./src/style.css" />
        <title>Weather Now</title>
    </head>

    <body>
        <div id="app">
            <div class="">
                <div class="container">
                    <nav class="navigation">
                        <div class="navigation__left">
                            <h2>Weather Now</h2>
                        </div>
                        <div class="navigation__right">
                            <button class="units-btn">
                                <svg
                                    width="14"
                                    height="18"
                                    viewBox="0 0 14 18"
                                    fill="none"
                                    xmlns="http://www.w3.org/2000/svg"
                                >
                                    <rect
                                        x="5"
                                        y="0"
                                        width="4"
                                        height="12"
                                        rx="2"
                                        fill="white"
                                        opacity="0.6"
                                    />
                                    <rect
                                        x="5"
                                        y="6"
                                        width="4"
                                        height="6"
                                        rx="0"
                                        fill="white"
                                    />
                                    <circle cx="7" cy="14" r="4" fill="white" />
                                </svg>
                                Units
                            </button>
                        </div>
                    </nav>

                    <h1>How's the sky looking today?</h1>

                    <div class="main-content">
                        <weather-app></weather-app>
                        <div class="weather">
                            <main>
                                <weather-hero></weather-hero>
                                <div class="metrics">
                                    <weather-metric
                                        type="Feels Like"
                                    ></weather-metric>
                                    <weather-metric
                                        type="Precipitation"
                                    ></weather-metric>
                                    <weather-metric
                                        type="Humidity"
                                    ></weather-metric>
                                    <weather-metric
                                        type="Wind Speed"
                                    ></weather-metric>
                                </div>
                                <weather-daily></weather-daily>
                            </main>
                            <aside>
                                <div class="hourly">
                                    <weather-hourly></weather-hourly>
                                </div>
                            </aside>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script type="module" src="./src/components/weather-hero.js"></script>
        <script type="module" src="./src/components/weather-metric.js"></script>
        <script type="module" src="./src/components/weather-search.js"></script>
        <script type="module" src="./src/components/weather-hourly.js"></script>
        <script type="module" src="./src/components/weather-daily.js"></script>
        <script type="module" src="./src/components/weather-app.js"></script>
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
